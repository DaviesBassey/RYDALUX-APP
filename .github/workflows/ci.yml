name: Rydalux CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: placeholder-jwt-access-secret-32-chars-long
      JWT_REFRESH_SECRET: placeholder-jwt-refresh-secret-32-chars-long
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @rydulux/prisma generate

      - name: Build API
        run: pnpm --filter @rydulux/api-services-local build

      - name: Run API Unit Tests
        # Integration tests require a running database and migrations, so they are excluded here.
        run: pnpm --filter @rydulux/api-services-local test -- --detectOpenHandles --runInBand

      - name: Build Admin
        run: pnpm --filter @rydulux/admin build

      - name: Mobile Typecheck
        run: pnpm --filter @rydulux/mobile exec tsc -p tsconfig.json --noEmit
