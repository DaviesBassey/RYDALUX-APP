version: '3.9'
services:
  postgres:
    image: postgis/postgis:15-3.4
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: rydalux
      POSTGRES_USER: rydalux
      POSTGRES_PASSWORD: rydaluxpass
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data
    ports:
      - '9000:9000'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
