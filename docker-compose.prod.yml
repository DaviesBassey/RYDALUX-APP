version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: rydalux
      POSTGRES_USER: rydalux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rydalux"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://rydalux:${POSTGRES_PASSWORD}@postgres:5432/rydalux
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:?PAYSTACK_SECRET_KEY is required}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET:?PAYSTACK_WEBHOOK_SECRET is required}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
      FINANCE_SCHEDULER_DISABLED: ${FINANCE_SCHEDULER_DISABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-migrate:
    profiles: ["ops"]
    build:
      context: .
      dockerfile: services/api/Dockerfile
    user: "0:0"
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rydalux:${POSTGRES_PASSWORD}@postgres:5432/rydalux
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy", "--schema", "packages/prisma/schema.prisma"]

  api-seed:
    profiles: ["ops"]
    build:
      context: .
      dockerfile: services/api/Dockerfile
    user: "0:0"
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rydalux:${POSTGRES_PASSWORD}@postgres:5432/rydalux
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "services/api/prisma-dist/seed.js"]

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
